# ---------------------------------------------------------------------------
# Application configuration (non-secret). Environment variables prefixed with
# IDBI_ override any value here. Nothing that drives lending policy is
# hardcoded in Python — it lives in this file and its siblings.
# ---------------------------------------------------------------------------
app:
  name: "IDBI Adaptive Lending Intelligence"
  environment: "development"
  api_prefix: "/api/v1"

cors:
  # Browser origins allowed to call the API. Local dev uses the Vite proxy
  # (same-origin, no CORS needed); deployed frontends call cross-origin, so
  # their exact origin must be listed here. Update the IP if the VM's changes.
  allow_origins:
    - "http://localhost:5173"
    - "http://127.0.0.1:5173"
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"
    - "http://34.100.235.201:3000"
    - "http://34.100.235.201:5173"

logging:
  level: "INFO"
  # "json" for production-style structured logs, "console" for readable dev output.
  renderer: "console"

# Deterministic seed for the synthetic data generator (M1). Fixing it keeps
# every metric on screen (AUC, lift, SHAP) reproducible across runs.
data:
  seed: 20260708
